<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador para Ale</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fce4ec; /* Volvemos a tu rosa muy suave original */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            /* Eliminadas las sombras oscuras */
            color: #880e4f; /* Volvemos al color de texto oscuro original */
        }

        /* --- CONTENEDOR PRINCIPAL --- */
        /* Agrupa el contador y el sticker uno al lado del otro */
        .main-wrapper {
            position: relative;
            z-index: 2; 
            display: flex;
            align-items: center; /* Alinea verticalmente al centro */
            gap: 40px; /* Espacio entre el contador y el sticker */
            flex-wrap: wrap; /* Para pantallas móviles */
            justify-content: center; /* Centra todo */
        }

        /* --- EL CONTADOR (Simplificado) --- */
        .container-contador {
            text-align: center;
            background: #ffffff; /* Fondo blanco puro */
            padding: 2.5rem 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); /* Sombra muy suave */
            max-width: 450px; 
            color: #880e4f; /* Asegurar color de texto oscuro */
        }

       /* --- EL STICKER (Sin el cuadro blanco) --- */
        .sticker-container {
            display: flex;
            justify-content: center;
            align-items: center;
            background: transparent; /* Quitamos el fondo blanco */
            padding: 0; /* Quitamos el espacio interno */
            border-radius: 0; /* Quitamos las esquinas redondeadas */
            box-shadow: none; /* Quitamos la sombra del cuadro */
            border: none; /* Quitamos el borde */
        }

        .sticker-image {
            max-width: 250px; /* Puedes hacerlo un poquito más grande ahora */
            height: auto;
            border-radius: 15px; /* Si quieres que la imagen misma tenga esquinas suaves */
        }

        /* --- ESTILOS DEL CONTADOR (Limpios) --- */
        h1 { 
            margin-bottom: 1.5rem; 
            font-size: 1.8rem; 
            margin-top: 0;
            /* Eliminada la sombra de texto */
        }

        .countdown {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .time-box {
            background: #f06292; /* Tu rosa original */
            color: white;
            padding: 15px;
            border-radius: 10px;
            min-width: 70px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); /* Sombra suave */
        }

        .time-box span { 
            display: block; 
            font-size: 2.5rem; 
            font-weight: bold; 
            /* Eliminada la sombra de texto */
        }

        .label { 
            font-size: 0.9rem; 
            text-transform: uppercase; 
            font-weight: 600;
        }

    </style>
</head>
<body>

    <!-- Nuevo Contenedor Principal que agrupa todo -->
    <div class="main-wrapper">
        
        <!-- Bloque 1: El Contador (Izquierda) -->
        <div class="container-contador">
            <h1>Para estar juntos falta:</h1>
            <div class="countdown">
                <div class="time-box"><span id="dias">0</span><div class="label">Días</div></div>
                <div class="time-box"><span id="horas">0</span><div class="label">Hrs</div></div>
                <div class="time-box"><span id="minutos">0</span><div class="label">Min</div></div>
                <div class="time-box"><span id="segundos">0</span><div class="label">Seg</div></div>
            </div>
        </div>

        <!-- Bloque 2: El Sticker (Derecha) -->
        <div class="sticker-container">
            <img src="sticker.gif" alt="sticker" class="sticker-image">
        </div>

    </div>

    <script>
        // Fecha objetivo (14 de mayo de 2026 00:00:00)
        const fechaObjetivo = new Date('May 29, 2026 22:00:00').getTime();

        const x = setInterval(function() {
            const ahora = new Date().getTime();
            const distancia = fechaObjetivo - ahora;

            // Cálculos
            const d = Math.floor(distancia / (1000 * 60 * 60 * 24));
            const h = Math.floor((distancia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((distancia % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((distancia % (1000 * 60)) / 1000);

            // Actualizar los números
            document.getElementById("dias").innerHTML = d;
            document.getElementById("horas").innerHTML = h;
            document.getElementById("minutos").innerHTML = m;
            document.getElementById("segundos").innerHTML = s;

            // Cuando llega a cero
            if (distancia < 1) {
                clearInterval(x);
                // Reemplazamos todo por el mensaje final
                document.querySelector(".main-wrapper").innerHTML = `
                    <div class="container-contador" style="max-width: none;">
                        <h1 style="font-size: 3rem; color: #880e4f;">¡Es hoy! ❤️</h1>
                        <p style="font-size: 1.2rem; color: #880e4f;">Estoy tan feliz de verte, Ale.</p>
                    </div>
                `;
            }
        }, 1000);
    </script>
</body>
</html>
