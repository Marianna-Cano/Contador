<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador Especial para Ale</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fce4ec; /* Fondo rosa suave */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #880e4f; 
        }

        /* CONTENEDOR PRINCIPAL (Agrupa todo) */
        .main-wrapper {
            display: flex;
            align-items: center; 
            gap: 40px; 
            flex-wrap: wrap; 
            justify-content: center; 
            padding: 20px;
        }

        /* Columna de la izquierda: Contador + Buzón */
        .left-column {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 450px;
            width: 100%;
        }

        .container-contador {
            text-align: center;
            background: #ffffff; 
            padding: 2.5rem 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
        }

        /* --- NUEVO ESTILO DEL BUZÓN --- */
        .container-buzon {
            text-align: center;
            background: #ffffff;
            padding: 1.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .container-buzon:hover {
            transform: scale(1.03); /* Se hace un poquito grande al pasar el mouse */
        }

        .mailbox-icon {
            font-size: 4rem;
            margin: 0;
            display: inline-block;
            transition: transform 0.3s;
        }

        .nota-sorpresa {
            display: none; /* Oculta la nota al principio */
            margin-top: 15px;
            padding: 15px;
            background: #fff0f6;
            border-left: 5px solid #f06292;
            border-radius: 8px;
            font-size: 1.1rem;
            color: #c2185b;
            line-height: 1.4;
            animation: aparecer 0.5s ease forward;
        }

        @keyframes aparecer {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* EL STICKER (Derecha) */
        .sticker-container {
            display: flex;
            justify-content: center;
            align-items: center;
            background: transparent; 
            padding: 0; 
            border: none;
        }

        .sticker-image {
            max-width: 250px; 
            height: auto;
            border-radius: 15px; 
        }

        /* ESTILOS DEL RELEOJ */
        h1 { margin-bottom: 1.5rem; font-size: 1.8rem; margin-top: 0; }
        h2 { font-size: 1.3rem; margin: 0 0 10px 0; }
        .countdown { display: flex; gap: 15px; justify-content: center; }
        .time-box { background: #f06292; color: white; padding: 15px; border-radius: 10px; min-width: 70px; }
        .time-box span { display: block; font-size: 2.5rem; font-weight: bold; }
        .label { font-size: 0.9rem; text-transform: uppercase; font-weight: 600; }
    </style>
</head>
<body>

    <div class="main-wrapper">
        
        <div class="left-column">
            
            <div class="container-contador">
                <h1>Para estar juntos falta:</h1>
                <div class="countdown">
                    <div class="time-box"><span id="dias">0</span><div class="label">Días</div></div>
                    <div class="time-box"><span id="horas">0</span><div class="label">Hrs</div></div>
                    <div class="time-box"><span id="minutos">0</span><div class="label">Min</div></div>
                    <div class="time-box"><span id="segundos">0</span><div class="label">Seg</div></div>
                </div>
            </div>

            <div class="container-buzon" onclick="abrirBuzon()">
                <h2>📬 Buzón de Notas</h2>
                <p id="instruccion" style="margin: 5px 0; font-size: 0.9rem; color: #a11d5d;">¡Tienes un mensaje nuevo! Da clic para abrir.</p>
                <div id="mailbox" class="mailbox-icon">📬</div>
                <div id="nota" class="nota-sorpresa">
                    <video src="video.mp4" controls style="width: 320px; height: 450px; object-fit: cover; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
                        Tu navegador no soporta videos.
                    </video>
                    <br>
                    <i> No hacen falta monedas brillantes, carros de lujo ni chamarras de piel elegantes, perfumes importados ni un buen reloj, tus besos pagan mejor... 😘🔥 </i>
                </div>
            </div>

        </div>

        <div class="sticker-container">
            <img src="sticker.gif" alt="sticker" class="sticker-image">
        </div>

    </div>

    <script>
        // LÓGICA DEL BUZÓN (Abrir y cerrar)
        let buzonAbierto = false;

        function abrirBuzon() {
            const mailbox = document.getElementById("mailbox");
            const nota = document.getElementById("nota");
            const instruccion = document.getElementById("instruccion");

            if (!buzonAbierto) {
                mailbox.innerHTML = "📂"; // Cambia el icono a carpeta/abierto
                mailbox.style.transform = "rotate(-5deg)";
                nota.style.display = "block"; // Muestra la carta
                instruccion.innerHTML = "Haz clic de nuevo para cerrar.";
                buzonAbierto = true;
            } else {
                mailbox.innerHTML = "📬"; // Vuelve a cerrarse
                mailbox.style.transform = "rotate(0deg)";
                nota.style.display = "none"; // Oculta la carta
                instruccion.innerHTML = "¡Tienes un mensaje nuevo! Da clic para abrir.";
                buzonAbierto = false;
            }
        }

        // Configura aquí tu nueva fecha objetivo (Año, Mes [0-11], Día, Hora...)
        const fechaObjetivo = new Date('Jun 18, 2026 22:00:00').getTime();

        const x = setInterval(function() {
            const ahora = new Date().getTime();
            const distancia = fechaObjetivo - ahora;

            const d = Math.floor(distancia / (1000 * 60 * 60 * 24));
            const h = Math.floor((distancia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((distancia % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((distancia % (1000 * 60)) / 1000);

            document.getElementById("dias").innerHTML = d;
            document.getElementById("horas").innerHTML = h;
            document.getElementById("minutos").innerHTML = m;
            document.getElementById("segundos").innerHTML = s;

            if (distancia < 1) {
                clearInterval(x);
                document.querySelector(".main-wrapper").innerHTML = `
                    <div class="container-contador" style="max-width: none;">
                        <h1 style="font-size: 3rem; color: #880e4f;">¡Es hoy! ❤️</h1>
                        <p style="font-size: 1.2rem; color: #880e4f;">Te amo!!</p>
                    </div>
                `;
            }
        }, 1000);
    </script>
</body>
</html>
